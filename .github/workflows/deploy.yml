name: CI/CD - Build, Test & Deploy to GCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1
  ARTIFACT_REGISTRY: asia-south1-docker.pkg.dev
  REPOSITORY: scheduler-repo

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci
        
      - name: Run tests
        working-directory: api
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: test_db
          DB_USER: postgres
          DB_PASSWORD: testpassword
          JWT_SECRET: test_secret
        run: npx jest --passWithNoTests

  build-cpp:
    name: Build C++ Engine
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y cmake g++ make

      - name: Build
        working-directory: cpp-engine
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - run: test -f cpp-engine/build/task-scheduler-engine

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test-api, build-cpp]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build API image
        run: |
          docker build \
          -f infrastructure/docker/Dockerfile.api \
          -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ github.sha }} \
          -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/api:latest \
          ./api

      - name: Push API image
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/api:latest

      - name: Build Worker image
        run: |
          docker build \
          -f infrastructure/docker/Dockerfile.worker \
          -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/worker:${{ github.sha }} \
          -t ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/worker:latest \
          ./worker

      - name: Push Worker image
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/worker:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/worker:latest

      - name: Deploy API
        run: |
          gcloud run deploy task-scheduler-api \
            --image=${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/api:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=github-actions@task-scheduler-system.iam.gserviceaccount.com \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --add-cloudsql-instances=task-scheduler-system:asia-south1:scheduler-db \
            --set-env-vars="NODE_ENV=production,GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},INSTANCE_CONNECTION_NAME=task-scheduler-system:asia-south1:scheduler-db,DB_NAME=notification_db,DB_USER=postgres,DB_PORT=5432" \
            --set-secrets="DB_PASSWORD=db-password:latest,JWT_SECRET=jwt-secret:latest"

      - name: Get API URL
        id: api
        run: |
          echo "url=$(gcloud run services describe task-scheduler-api --region=${{ env.GCP_REGION }} --format='value(status.url)')" >> $GITHUB_OUTPUT

      - name: Deploy Worker
        run: |
          gcloud run deploy task-scheduler-worker \
            --image=${{ env.ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/worker:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --service-account=github-actions@task-scheduler-system.iam.gserviceaccount.com \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=5 \
            --set-env-vars="GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},API_BASE_URL=${{ steps.api.outputs.url }}"

      - name: Verify API
        run: |
          curl --fail "${{ steps.api.outputs.url }}/health"

      - name: Deployment Summary
        run: |
          echo "Deployment successful"
          echo "API: ${{ steps.api.outputs.url }}"
          echo "Commit: ${{ github.sha }}"
